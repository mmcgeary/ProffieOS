# Demo INI: all built-in INI prop styles
# Copy to SD root as: saber_config.ini

[global]
volume = 85
clash_threshold = 4
num_buttons = 2
button_profile = default
twist_on = true
twist_off = true
stab_on = false
swing_on = false
thrust_on = false
force_push = true
melt = true

[preset1]
name = Standard Demo
font = Kestis
track =
style = standard
base_color = dodgerblue
alt_color = cyan
blast_color = white
clash_color = white
lockup_color = white
drag_color = orange
lb_color = cyan
stab_color = white
swing_color = deepskyblue
emitter_color = dodgerblue
preon_color = dodgerblue
off_color = black
ignition_time = 300
retraction_time = 250

