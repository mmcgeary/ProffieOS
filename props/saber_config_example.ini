# saber_config.ini — ProffieOS INI Configuration
# Place on the root of your SD card.
# Edit values to customize without reflashing.
#
# Lines starting with # are comments.
# Section headers are in [brackets].
# Keys are case-insensitive.

# ============================================================
# GLOBAL SETTINGS
# ============================================================
[global]
# Volume: 0-100 (percentage)
volume = 80

# Clash sensitivity: 1 (most sensitive) to 16 (least sensitive)
clash_threshold = 8

# Number of physical buttons: 1, 2, or 3
num_buttons = 2

# Button profile: "default"
button_profile = default

# --- Gesture Controls ---
# Set to true/false to enable/disable
twist_on = true
twist_off = true
stab_on = false
swing_on = false
thrust_on = false
force_push = true
melt = true

# ============================================================
# PRESETS (1-20)
# ============================================================

[preset1]
name = Blue Standard
font = font1
track = tracks/track1.wav
style = standard

# Colors: named colors OR (R,G,B) tuples (0-255)
base_color = blue
alt_color = cyan
blast_color = white
clash_color = white
lockup_color = white
drag_color = orange
lb_color = cyan
stab_color = white
swing_color = (0,0,0)
emitter_color = blue
preon_color = blue
off_color = (0,0,0)

# Off-state animation (minimal controls)
# off_mode: pulse|random
off_mode = pulse
off_rate_ms = 1200

# Timing (milliseconds, 50-2000)
ignition_time = 300
retraction_time = 200

# Runtime style tuning (all optional; shown with defaults)
flicker_depth = 12000
flicker_speed = 1000
stripe_width = 5000
stripe_speed = 900
motion_gain = 4096
noise_mix = 8000
# preferred key (legacy alias: core_contrast)
base_contrast = 32768
pulse_rate = 1200
pulse_depth = 9000
strobe_freq = 15
strobe_ms = 1
drift_rate = 600
warm_shift = 2000
jitter_amount = 50
spark_mix = 5000
heat_rand = 4500
fire_cooling = 55
rainbow_speed = 800

[preset2]
name = Red Unstable
font = font2
track = tracks/track2.wav
style = unstable

base_color = red
alt_color = (255,50,0)
blast_color = white
clash_color = yellow
lockup_color = (255,100,0)
drag_color = orange
lb_color = (200,200,255)
stab_color = white
swing_color = (0,0,0)
emitter_color = red
preon_color = red
off_color = (0,0,0)
off_mode = random
off_rate_ms = 850

ignition_time = 400
retraction_time = 250

[preset3]
name = Green Fire
font = font3
track = tracks/track3.wav
style = fire

base_color = green
alt_color = yellow
blast_color = white
clash_color = white
lockup_color = white
drag_color = orange
lb_color = green
stab_color = white
swing_color = (0,0,0)
emitter_color = green
preon_color = green
off_color = (0,0,0)
off_mode = pulse
off_rate_ms = 1000

ignition_time = 350
retraction_time = 200

# ============================================================
# BUTTON OVERRIDES (Optional)
# Override individual slot actions from the default profile.
# Available actions include standard actions plus SA22C helpers:
#   on, off, blast, clash, lockup, drag, melt, lightning_block, force,
#   stab, color_change, next_preset, prev_preset, volume_up, volume_down,
#   track_player, battery_level, quote, on_or_volume_up,
#   next_preset_or_volume_down, prev_preset_if_not_volume_menu,
#   activate_muted, toggle_volume_menu, toggle_battle_mode,
#   toggle_multi_blast, force_or_color_change, lockup_or_drag, none
#
# Default slot mapping now follows SA22C and depends on global.num_buttons:
#   1-button highlights:
#     OFF: slot_0=on_or_volume_up, slot_1=next_preset_or_volume_down,
#          slot_4=track_player, slot_24=activate_muted, slot_25=battery_level
#     ON:  slot_0=blast, slot_3=off, slot_24=lightning_block,
#          slot_30=lockup_or_drag, slot_31=melt
#   2-button highlights:
#     OFF: slot_0=on_or_volume_up, slot_1=track_player, slot_5=next_preset_or_volume_down,
#          slot_6=toggle_volume_menu, slot_8=battery_level, slot_24=activate_muted
#     ON:  slot_23=off, slot_4=force, slot_5=blast, slot_7=lockup_or_drag,
#          slot_12=color_change, slot_24=lightning_block, slot_27=toggle_multi_blast
#   3-button additions:
#     OFF: slot_13=prev_preset
#     ON:  slot_15=lightning_block, slot_29=toggle_battle_mode
# ============================================================

[buttons_on]
# Uncomment to override:
# slot_5 = clash
# slot_9 = battery_level

[buttons_off]
# Uncomment to override:
# slot_5 = prev_preset
