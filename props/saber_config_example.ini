# saber_config.ini — ProffieOS INI Configuration
# Place on the root of your SD card.
# Edit values to customize without reflashing.
#
# Lines starting with # are comments.
# Section headers are in [brackets].
# Keys are case-insensitive.

# ============================================================
# GLOBAL SETTINGS
# ============================================================
[global]
# Volume: 0-100 (percentage)
volume = 80

# Clash sensitivity: 1 (most sensitive) to 16 (least sensitive)
clash_threshold = 8

# Number of physical buttons: 1, 2, or 3
num_buttons = 2

# Button profile: "default"
button_profile = default

# --- Gesture Controls ---
# Set to true/false to enable/disable
twist_on = true
twist_off = true
stab_on = false
swing_on = false
thrust_on = false
force_push = true
melt = true

# ============================================================
# PRESETS (1-20)
# ============================================================

[preset1]
name = Blue Standard
font = font1
track = tracks/track1.wav
style = standard

# Colors: named colors OR (R,G,B) tuples (0-255)
base_color = blue
alt_color = cyan
blast_color = white
clash_color = white
lockup_color = white
drag_color = orange
lb_color = cyan
stab_color = white
swing_color = (0,0,0)
emitter_color = blue
preon_color = blue
off_color = (0,0,0)

# Off-state animation (minimal controls)
# off_mode: pulse|random
off_mode = pulse
off_rate_ms = 1200

# Timing (milliseconds, 50-2000)
ignition_time = 300
retraction_time = 200

[preset2]
name = Red Unstable
font = font2
track = tracks/track2.wav
style = unstable

base_color = red
alt_color = (255,50,0)
blast_color = white
clash_color = yellow
lockup_color = (255,100,0)
drag_color = orange
lb_color = (200,200,255)
stab_color = white
swing_color = (0,0,0)
emitter_color = red
preon_color = red
off_color = (0,0,0)
off_mode = random
off_rate_ms = 850

ignition_time = 400
retraction_time = 250

[preset3]
name = Green Fire
font = font3
track = tracks/track3.wav
style = fire

base_color = green
alt_color = yellow
blast_color = white
clash_color = white
lockup_color = white
drag_color = orange
lb_color = green
stab_color = white
swing_color = (0,0,0)
emitter_color = green
preon_color = green
off_color = (0,0,0)
off_mode = pulse
off_rate_ms = 1000

ignition_time = 350
retraction_time = 200

# ============================================================
# BUTTON OVERRIDES (Optional)
# Override individual slot actions from the default profile.
# Available actions: on, off, blast, clash, lockup, drag, melt,
#   lightning_block, force, stab, color_change, next_preset,
#   prev_preset, volume_up, volume_down, track_player,
#   battery_level, quote, none
#
# Slot reference (2-button default profile):
#   ON state:  0=off, 1=color_change, 2=lockup, 3=melt, 4=force,
#              5=blast, 6=next_preset, 7=lightning_block, 8=drag,
#              9=quote, 10=battery_level, 11=volume_up, 12=track_player
#   OFF state: 0=on, 1=next_preset, 4=prev_preset,
#              5=next_preset, 6=prev_preset, 7=volume_up,
#              8=volume_down, 9=track_player, 10=battery_level
# ============================================================

[buttons_on]
# Uncomment to override:
# slot_5 = clash
# slot_9 = battery_level

[buttons_off]
# Uncomment to override:
# slot_5 = prev_preset
