# saber_config.ini — Test Configuration with 3 Sample Presets
# Copy this to the root of your SD card as "saber_config.ini"

[global]
volume = 85
clash_threshold = 4
num_buttons = 2
button_profile = default

# Gestures
twist_on = true
twist_off = true
stab_on = false
swing_on = false
thrust_on = false
force_push = true
melt = true

# ============================================================
# PRESET 1: "Kestis Blue" — calm Jedi, standard style
# ============================================================
[preset1]
name = Kestis Blue
font = Kestis
track = tracks/Kestis.wav
style = standard

base_color = dodgerblue
alt_color = cyan
blast_color = white
clash_color = (255,255,224)
lockup_color = white
drag_color = orange
lb_color = cyan
stab_color = white
swing_color = deepskyblue
emitter_color = dodgerblue
preon_color = dodgerblue
off_color = black

ignition_time = 300
retraction_time = 200

# ============================================================
# PRESET 2: "Sith Lord" — aggressive red, unstable style
# ============================================================
[preset2]
name = Sith Lord
font = SmthJedi
track = tracks/mars.wav
style = unstable

base_color = red
alt_color = orangered
blast_color = white
clash_color = yellow
lockup_color = white
drag_color = (255,69,0)
lb_color = (100,149,237)
stab_color = white
swing_color = maroon
emitter_color = red
preon_color = (139,0,0)
off_color = black

ignition_time = 200
retraction_time = 400

# ============================================================
# PRESET 3: "Temple Guard" — gold/yellow, pulsing accent
# ============================================================
[preset3]
name = Temple Guard
font = TmplGrd
track = tracks/endtitle.wav
style = rainbow

base_color = gold
alt_color = yellow
blast_color = white
clash_color = white
lockup_color = (255,255,224)
drag_color = orange
lb_color = cyan
stab_color = white
swing_color = (240,230,140)
emitter_color = gold
preon_color = gold
off_color = black

ignition_time = 250
retraction_time = 300
