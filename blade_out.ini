# blade_out.ini - no-blade / crystal-chamber sample bank
# Keep this file on SD root as: blade_out.ini
#
# Notes:
# - This file is loaded when blade detect reports "no blade".
# - Global/button sections from saber_config.ini are preserved by the prop.
# - If INI_NUM_BLADES > 1, accent_style drives the chamber/accent blade.
# - If INI_NUM_BLADES == 1, accent_style is ignored and main style drives output.

[preset1]
name = Chamber Static
font = Kestis
track =
style = standard
base_color = dodgerblue
alt_color = cyan
blast_color = white
clash_color = white
lockup_color = white
drag_color = orange
lb_color = cyan
stab_color = white
swing_color = black
emitter_color = dodgerblue
preon_color = dodgerblue
off_color = dodgerblue
off_mode = pulse
off_rate_ms = 1200
ignition_time = 300
retraction_time = 250
accent_style = static
accent_speed = 1000

